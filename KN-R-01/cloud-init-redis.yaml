#cloud-config
# KN-R-01: Redis (Key-Value-Datenbank) als Docker-Image auf einer AWS-Instanz.
# Installiert Docker und startet Redis 7 mit Passwort-Auth und Persistenz
# (appendonly), erreichbar auf Port 6379.
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin
    home: /home/ubuntu
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-rsa  teacher
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKCuWX/W66sjjNiDNuPpKgYO1xFqDoMJoeo5hz2LDNrF teacher-wir
      - ssh-rsa  Thomas
ssh_pwauth: true
disable_root: false
package_update: true
packages:
  - docker.io
runcmd:
  - sudo systemctl enable docker
  - sudo systemctl start docker
  - sudo docker run -d --name redis --restart unless-stopped -p 6379:6379 redis:7 redis-server --requirepass "Thomas-Password" --appendonly yes
