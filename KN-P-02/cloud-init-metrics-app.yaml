#cloud-config
# KN-P-02 B) Hostet die eigene Metrics-App (app.js) auf einem zusaetzlichen
# AWS-Server. Node.js wird installiert, die App als systemd-Service gestartet,
# damit der /metrics-Endpoint dauerhaft laeuft und von Prometheus gescrapt
# werden kann.
users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin
    home: /home/ubuntu
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-rsa  teacher
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKCuWX/W66sjjNiDNuPpKgYO1xFqDoMJoeo5hz2LDNrF teacher-wir
      - ssh-rsa  Thomas
ssh_pwauth: true
disable_root: false
package_update: true
packages:
  - nodejs
write_files:
  - path: /opt/metrics-app/app.js
    permissions: '0644'
    content: |
      const http = require("http");
      const PORT = 8080;
      const server = http.createServer((req, res) => {
        if (req.url === "/metrics") {
          const wert = Math.floor(Math.random() * 101);
          res.writeHead(200, { "Content-Type": "text/plain; version=0.0.4" });
          res.end(
            "# HELP sternfitness_random_value Simulierte Kennzahl (Zufallswert 0-100), z. B. Requests pro Sekunde\n" +
              "# TYPE sternfitness_random_value gauge\n" +
              `sternfitness_random_value ${wert}\n`
          );
        } else {
          res.writeHead(200, { "Content-Type": "text/plain; charset=utf-8" });
          res.end("SternFitness Metrics-App (KN-P-02). Metrik unter /metrics\n");
        }
      });
      server.listen(PORT, "0.0.0.0", () => {
        console.log(`Metrics-App laeuft auf Port ${PORT}, Endpoint /metrics`);
      });
  - path: /etc/systemd/system/metrics-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=SternFitness Metrics App (KN-P-02)
      After=network.target

      [Service]
      ExecStart=/usr/bin/node /opt/metrics-app/app.js
      Restart=always
      User=ubuntu

      [Install]
      WantedBy=multi-user.target
runcmd:
  - sudo systemctl daemon-reload
  - sudo systemctl enable metrics-app.service
  - sudo systemctl start metrics-app.service
