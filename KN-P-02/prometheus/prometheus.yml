global:
  scrape_interval: 15s
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: node
    static_configs:
      - targets: ['localhost:9100']
  # KN-P-02 B) Eigene Metrics-App. Prometheus scrapt den /metrics-Endpoint
  # der zusaetzlichen AWS-Instanz. <APP_IP> = oeffentliche IP des App-Servers
  # (dynamisch, siehe .gemini/details.md).
  - job_name: sternfitness_app
    static_configs:
      - targets: ['<APP_IP>:8080']
rule_files:
  - "/etc/prometheus/rules.yml"
