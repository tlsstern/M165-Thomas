groups:
  - name: custom_rules
    rules:
      - record: node_memory_MemFree_percent
        expr: 100 - (100 * node_memory_MemFree_bytes / node_memory_MemTotal_bytes)
      - record: node_filesystem_free_percent
        expr: 100 * node_filesystem_free_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}
  - name: alert_rules
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          serverity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "Instance {{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."
  # KN-P-02 B) Eigene Rule auf der selbst geschriebenen Metrik.
  - name: sternfitness_rules
    rules:
      # Recording Rule: gleitender 5-Minuten-Durchschnitt der Kennzahl
      - record: sternfitness_random_value_avg5m
        expr: avg_over_time(sternfitness_random_value[5m])
      # Alert: schlaegt an, wenn die Kennzahl ueber 80 steigt
      - alert: SternFitnessHighLoad
        expr: sternfitness_random_value > 80
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "SternFitness Kennzahl hoch auf {{ $labels.instance }}"
          description: "sternfitness_random_value = {{ $value }} (> 80) seit mehr als 1 Minute."
